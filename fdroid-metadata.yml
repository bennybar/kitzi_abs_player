Categories:
  - Audio
  - Media

License: GPL-3.0-only

Repo: https://github.com/bennybar/kitzi_abs_player

WebSite: https://github.com/bennybar/kitzi_abs_player

SourceCode: https://github.com/bennybar/kitzi_abs_player

IssueTracker: https://github.com/bennybar/kitzi_abs_player/issues

Changelog: https://github.com/bennybarak/kitzi/releases

AutoUpdateMode: Version
UpdateCheckMode: Tags

Builds:
  - versionName: 1.0.2
    versionCode: 18
    commit: v1.0.2
    subdir: app
    gradle:
      - yes
    prebuild: |
      # Set up Flutter environment
      export PATH="$PATH:/opt/flutter/bin"
      flutter --version
      flutter pub get
    build: |
      flutter build apk --release
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter:3.7.2
      - dart:3.7.2
